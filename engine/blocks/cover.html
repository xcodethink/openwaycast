<template id="{{ID}}-template">
  <div data-composition-id="{{ID}}" data-width="1080" data-height="1920" data-start="0" data-duration="6.6">

    <div class="bg"></div>
    <div class="frame"></div>

    <div class="pad">
      <div class="meta">
        <span>{{META_L}}</span>
        <span class="live"><span class="dot"></span>{{META_R}}</span>
      </div>

      <div class="center">
        <div class="lock">
          <div class="word">{{WORD}}</div>
          <div class="sub">{{SUB}}</div>
        </div>

        <div class="rule"></div>

        <div class="kicker">{{KICKER}}</div>
        <div class="hero">{{HERO}}</div>
        <div class="tag">{{TAG}}</div>
      </div>
    </div>

    <div class="brand"><span>{{BRAND_MARK}}</span> {{BRAND_NAME}}</div>
    <div class="seq">{{SEQ}}</div>

    <style>
      @font-face{font-family:'Noto Sans SC';font-weight:500;src:url('fonts/NotoSansSC-Medium.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:600;src:url('fonts/NotoSansSC-SemiBold.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:700;src:url('fonts/NotoSansSC-Bold.ttf') format('truetype');font-display:block}
      [data-composition-id="{{ID}}"]{--accent:{{ACCENT}};position:absolute;inset:0;width:1080px;height:1920px;overflow:hidden;background:{{BG}};color:#f4f6f8;font-family:'Noto Sans SC',sans-serif}
      [data-composition-id="{{ID}}"] .bg{position:absolute;inset:0;background:
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(0deg,rgba(255,255,255,.045) 1px,transparent 1px),
        radial-gradient(120% 80% at 50% 22%,color-mix(in srgb,var(--accent) 9%,{{BG}}) 0%,{{BG}} 60%);
        background-size:120px 120px,120px 120px,100% 100%}
      [data-composition-id="{{ID}}"] .frame{position:absolute;inset:34px;border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);pointer-events:none}
      [data-composition-id="{{ID}}"] .pad{position:absolute;inset:0;padding:84px 78px 170px;display:flex;flex-direction:column}
      [data-composition-id="{{ID}}"] .meta{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:29px;letter-spacing:.14em;color:#59626d;border-bottom:1px solid #242b33;padding-bottom:30px}
      [data-composition-id="{{ID}}"] .meta .live{display:flex;align-items:center;gap:16px;color:var(--accent)}
      [data-composition-id="{{ID}}"] .dot{width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 26px color-mix(in srgb,var(--accent) 75%,transparent)}
      [data-composition-id="{{ID}}"] .center{margin:auto 0;display:flex;flex-direction:column;align-items:center;text-align:center}
      [data-composition-id="{{ID}}"] .lock{display:flex;flex-direction:column;align-items:center}
      [data-composition-id="{{ID}}"] .word{font-family:'Oswald','Noto Sans SC',sans-serif;font-weight:700;font-size:128px;line-height:1;letter-spacing:.02em;opacity:0}
      [data-composition-id="{{ID}}"] .sub{font-family:'Oswald',sans-serif;font-weight:500;font-size:40px;letter-spacing:.26em;color:#9aa3ad;text-transform:uppercase;margin-top:16px;opacity:0}
      [data-composition-id="{{ID}}"] .rule{width:120px;height:3px;background:var(--accent);margin:54px 0 0;opacity:0}
      [data-composition-id="{{ID}}"] .kicker{font-family:'Oswald',sans-serif;font-weight:600;font-size:32px;letter-spacing:.22em;color:#9aa3ad;text-transform:uppercase;margin-top:48px;opacity:0}
      [data-composition-id="{{ID}}"] .hero{font-family:'Oswald',sans-serif;font-weight:700;font-size:124px;line-height:.98;color:#f4f6f8;text-transform:uppercase;margin-top:14px;opacity:0}
      [data-composition-id="{{ID}}"] .tag{font-family:'Noto Sans SC';font-weight:600;font-size:42px;color:#cfd5dc;margin-top:34px;opacity:0}
      [data-composition-id="{{ID}}"] .tag em{font-style:normal;color:var(--accent)}
      [data-composition-id="{{ID}}"] .brand{position:absolute;bottom:64px;left:78px;font-family:'Oswald',sans-serif;font-weight:600;font-size:36px;color:#9aa3ad;letter-spacing:.08em}
      [data-composition-id="{{ID}}"] .brand span{color:var(--accent)}
      [data-composition-id="{{ID}}"] .seq{position:absolute;bottom:64px;right:78px;font-family:'JetBrains Mono',monospace;font-size:33px;color:#59626d;letter-spacing:.1em}
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function(){
        var ID="{{ID}}";
        var root=document.querySelector('[data-composition-id="'+ID+'"]');
        var $=function(s){return root.querySelector(s)};
        var bg=$('.bg'),center=$('.center');
        var meta=$('.meta'),word=$('.word'),sub=$('.sub'),rule=$('.rule'),
            kicker=$('.kicker'),hero=$('.hero'),tag=$('.tag'),brand=$('.brand'),seq=$('.seq');
        gsap.set([meta,brand,seq],{opacity:0});
        window.__timelines=window.__timelines||{};
        var D=parseFloat(root.getAttribute('data-duration'))||6.6;
        var tl=gsap.timeline({paused:true});
        tl.to(bg,{scale:1.07,duration:D,ease:"none",transformOrigin:"50% 42%"},0)
          .to(center,{scale:1.03,y:-14,duration:D,ease:"sine.inOut",transformOrigin:"50% 42%"},0);
        tl.to(meta,{opacity:1,duration:.5},0.1)
          .to([brand,seq],{opacity:1,duration:.4},0.2)
          .to(word,{opacity:1,y:0,scale:1,duration:.8,ease:"back.out(1.4)"},0.6).from(word,{y:30,scale:.86,filter:"blur(10px)",transformOrigin:"50% 50%"},0.6)
          .to(sub,{opacity:1,duration:.5,ease:"power2.out"},1.5)
          .to(rule,{opacity:1,scaleX:1,duration:.5,ease:"power2.out"},2.1).from(rule,{scaleX:0,transformOrigin:"50% 50%"},2.1)
          .to(kicker,{opacity:1,duration:.45,ease:"power2.out"},2.6)
          .to(hero,{opacity:1,scale:1,duration:.7,ease:"back.out(1.5)"},3.0).from(hero,{scale:.7,filter:"blur(14px)",transformOrigin:"50% 60%"},3.0)
          .to(tag,{opacity:1,y:0,duration:.55,ease:"power2.out"},4.0).from(tag,{y:14},4.0);
        var bt=Math.min(5.0, D-0.6), bd=Math.max(0.5,(D-bt)/2);  // 呼吸收尾不得越过 D(否则 tl.duration()>data-duration,尾部被切)
        tl.to(hero,{scale:1.025,duration:bd,ease:"sine.inOut",yoyo:true,repeat:1,transformOrigin:"50% 60%"},bt);
        tl.set({},{},6.6);
        window.__timelines[ID]=tl;
      })();
    </script>
  </div>
</template>
