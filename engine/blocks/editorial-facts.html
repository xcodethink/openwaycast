<template id="{{ID}}-template">
  <div data-composition-id="{{ID}}" data-width="1080" data-height="1920" data-start="0" data-duration="5.3">

    <div class="bg"></div>
    <div class="frame"></div>

    <div class="pad">
      <div class="meta"><span>{{META_L}}</span><span>{{META_R}}</span></div>

      <div class="center">
        <div class="kicker">{{KICKER}}</div>
        <div class="head">{{HEAD}}</div>
        <div class="body">{{BODY}}</div>

        <div class="facts">
<!--ITEMS:FACTS--><div class="fact"><span class="fn">{{fn}}</span><span class="fl">{{fl}}</span></div>
<!--/ITEMS--></div>
      </div>
    </div>

    <div class="brand"><span>{{BRAND_MARK}}</span> {{BRAND_NAME}}</div>
    <div class="seq">{{SEQ}}</div>

    <style>
      @font-face{font-family:'Noto Sans SC';font-weight:500;src:url('fonts/NotoSansSC-Medium.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:600;src:url('fonts/NotoSansSC-SemiBold.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:700;src:url('fonts/NotoSansSC-Bold.ttf') format('truetype');font-display:block}
      [data-composition-id="{{ID}}"]{--accent:{{ACCENT}};--accent2:{{ACCENT2}};position:absolute;inset:0;width:1080px;height:1920px;overflow:hidden;background:{{BG}};color:#f4f6f8;font-family:'Noto Sans SC',sans-serif}
      [data-composition-id="{{ID}}"] .bg{position:absolute;inset:0;background:
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(0deg,rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(180deg,color-mix(in srgb,#ffffff 3%,{{BG}}) 0%,{{BG}} 100%);background-size:120px 120px,120px 120px,100% 100%}
      [data-composition-id="{{ID}}"] .frame{position:absolute;inset:34px;border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);pointer-events:none}
      [data-composition-id="{{ID}}"] .pad{position:absolute;inset:0;padding:84px 78px 170px;display:flex;flex-direction:column}
      [data-composition-id="{{ID}}"] .meta{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:29px;letter-spacing:.14em;color:#59626d;border-bottom:1px solid #242b33;padding-bottom:30px}
      [data-composition-id="{{ID}}"] .center{margin:auto 0;display:flex;flex-direction:column;align-items:flex-start}
      [data-composition-id="{{ID}}"] .kicker{font-family:'Oswald',sans-serif;font-weight:600;font-size:34px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;opacity:0}
      [data-composition-id="{{ID}}"] .head{font-family:'Oswald','Noto Sans SC',sans-serif;font-weight:700;font-size:90px;line-height:1.06;margin-top:26px;opacity:0}
      [data-composition-id="{{ID}}"] .head em{font-style:normal;color:var(--accent)}
      [data-composition-id="{{ID}}"] .body{font-family:'Noto Sans SC';font-weight:500;font-size:40px;color:#9aa3ad;margin-top:40px;line-height:1.5;opacity:0}
      [data-composition-id="{{ID}}"] .facts{display:flex;align-items:center;gap:48px;margin-top:80px;opacity:0}
      [data-composition-id="{{ID}}"] .fact{display:flex;align-items:baseline;gap:22px}
      [data-composition-id="{{ID}}"] .fact:not(:last-child){border-right:1px solid #242b33;padding-right:48px}
      [data-composition-id="{{ID}}"] .fact .fn{font-family:'Oswald',sans-serif;font-weight:700;font-size:104px;line-height:.9;color:var(--accent)}
      [data-composition-id="{{ID}}"] .fact .fl{font-family:'Noto Sans SC';font-weight:600;font-size:30px;color:#cfd5dc;line-height:1.35}
      [data-composition-id="{{ID}}"] .fact .fl i{font-style:normal;font-weight:500;font-size:25px;color:#59626d}
      [data-composition-id="{{ID}}"] .brand{position:absolute;bottom:64px;left:78px;font-family:'Oswald',sans-serif;font-weight:600;font-size:36px;color:#9aa3ad;letter-spacing:.08em}
      [data-composition-id="{{ID}}"] .brand span{color:var(--accent)}
      [data-composition-id="{{ID}}"] .seq{position:absolute;bottom:64px;right:78px;font-family:'JetBrains Mono',monospace;font-size:33px;color:#59626d;letter-spacing:.1em}
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function(){
        var ID="{{ID}}";
        var root=document.querySelector('[data-composition-id="'+ID+'"]');
        var $=function(s){return root.querySelector(s)},$$=function(s){return root.querySelectorAll(s)};
        var bg=$('.bg'),center=$('.center');
        var meta=$('.meta'),kicker=$('.kicker'),head=$('.head'),body=$('.body'),facts=$('.facts'),brand=$('.brand'),seq=$('.seq');
        var fns=$$('.fact .fn');
        gsap.set([meta,brand,seq],{opacity:0});
        window.__timelines=window.__timelines||{};
        var D=parseFloat(root.getAttribute('data-duration'))||5.3;
        var tl=gsap.timeline({paused:true});
        tl.to(bg,{scale:1.07,duration:D,ease:"none",transformOrigin:"40% 45%"},0)
          .to(center,{scale:1.025,y:-12,duration:D,ease:"sine.inOut",transformOrigin:"0% 40%"},0);
        tl.to(meta,{opacity:1,duration:.5},0.1)
          .to([brand,seq],{opacity:1,duration:.4},0.2)
          .to(kicker,{opacity:1,y:0,duration:.5,ease:"power3.out"},0.4).from(kicker,{y:18},0.4)
          .to(head,{opacity:1,y:0,duration:.7,ease:"power3.out"},0.9).from(head,{y:34},0.9)
          .to(body,{opacity:1,y:0,duration:.6,ease:"power2.out"},Math.min(2.6,D*0.34)).from(body,{y:14},Math.min(2.6,D*0.34))
          .to(facts,{opacity:1,y:0,duration:.6,ease:"power3.out"},Math.min(4.0,D*0.55)).from(facts,{y:30},Math.min(4.0,D*0.55));
        var ft=Math.min(4.1,D*0.56);
        fns.forEach(function(n,i){ tl.from(n,{scale:.5,duration:.55,ease:"back.out(2)",transformOrigin:"0% 50%"},ft+i*0.18); });
        var bt=Math.min(5.0,D*0.7), bd=Math.max(1.0,(D-bt)/2);
        tl.to(fns,{scale:1.06,duration:bd,ease:"sine.inOut",yoyo:true,repeat:1,transformOrigin:"0% 50%"},bt);
        tl.set({},{},5.3);
        window.__timelines[ID]=tl;
      })();
    </script>
  </div>
</template>
