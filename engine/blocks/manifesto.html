<template id="{{ID}}-template">
  <div data-composition-id="{{ID}}" data-width="1080" data-height="1920" data-start="0" data-duration="6.0">

    <div class="bg"></div>
    <div class="frame"></div>

    <div class="pad">
      <div class="meta"><span>{{META_L}}</span><span>{{META_R}}</span></div>

      <div class="center">
        <div class="label">{{LABEL}}</div>

        <div class="beliefs">
<!--ITEMS:ITEMS--><div class="belief"><span class="bmark">{{BRAND_MARK}}</span><div class="bbody"><div class="bh">{{bh}}</div><div class="bd">{{bd}}</div></div></div>
<!--/ITEMS--></div>
      </div>
    </div>

    <div class="brand"><span>{{BRAND_MARK}}</span> {{BRAND_NAME}}</div>
    <div class="seq">{{SEQ}}</div>

    <style>
      @font-face{font-family:'Noto Sans SC';font-weight:500;src:url('fonts/NotoSansSC-Medium.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:600;src:url('fonts/NotoSansSC-SemiBold.ttf') format('truetype');font-display:block}
      @font-face{font-family:'Noto Sans SC';font-weight:700;src:url('fonts/NotoSansSC-Bold.ttf') format('truetype');font-display:block}
      [data-composition-id="{{ID}}"]{--accent:{{ACCENT}};--accent2:{{ACCENT2}};position:absolute;inset:0;width:1080px;height:1920px;overflow:hidden;background:{{BG}};color:#f4f6f8;font-family:'Noto Sans SC',sans-serif}
      [data-composition-id="{{ID}}"] .bg{position:absolute;inset:0;background:
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px),
        linear-gradient(0deg,rgba(255,255,255,.045) 1px,transparent 1px),
        radial-gradient(120% 80% at 50% 40%,color-mix(in srgb,var(--accent) 9%,{{BG}}) 0%,{{BG}} 62%);background-size:120px 120px,120px 120px,100% 100%}
      [data-composition-id="{{ID}}"] .frame{position:absolute;inset:34px;border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);pointer-events:none}
      [data-composition-id="{{ID}}"] .pad{position:absolute;inset:0;padding:84px 78px 170px;display:flex;flex-direction:column}
      [data-composition-id="{{ID}}"] .meta{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:29px;letter-spacing:.14em;color:#59626d;border-bottom:1px solid #242b33;padding-bottom:30px}
      [data-composition-id="{{ID}}"] .center{margin:auto 0;display:flex;flex-direction:column}
      [data-composition-id="{{ID}}"] .label{font-family:'Oswald',sans-serif;font-weight:600;font-size:44px;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;opacity:0;margin-bottom:64px}
      [data-composition-id="{{ID}}"] .beliefs{display:flex;flex-direction:column;gap:62px}
      [data-composition-id="{{ID}}"] .belief{display:flex;gap:32px;align-items:flex-start;opacity:0}
      [data-composition-id="{{ID}}"] .bmark{font-family:'Oswald',sans-serif;font-size:46px;color:var(--accent);line-height:1.05;flex:0 0 auto}
      [data-composition-id="{{ID}}"] .bh{font-family:'Oswald','Noto Sans SC',sans-serif;font-weight:700;font-size:68px;line-height:1.04}
      [data-composition-id="{{ID}}"] .bh em{font-style:normal;color:var(--accent)}
      [data-composition-id="{{ID}}"] .bd{font-family:'Noto Sans SC';font-weight:500;font-size:34px;color:#9aa3ad;margin-top:14px;line-height:1.4}
      [data-composition-id="{{ID}}"] .brand{position:absolute;bottom:64px;left:78px;font-family:'Oswald',sans-serif;font-weight:600;font-size:36px;color:#9aa3ad;letter-spacing:.08em}
      [data-composition-id="{{ID}}"] .brand span{color:var(--accent)}
      [data-composition-id="{{ID}}"] .seq{position:absolute;bottom:64px;right:78px;font-family:'JetBrains Mono',monospace;font-size:33px;color:#59626d;letter-spacing:.1em}
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function(){
        var ID="{{ID}}";
        var root=document.querySelector('[data-composition-id="'+ID+'"]');
        var $=function(s){return root.querySelector(s)},$$=function(s){return root.querySelectorAll(s)};
        var bg=$('.bg'),center=$('.center');
        var meta=$('.meta'),label=$('.label'),brand=$('.brand'),seq=$('.seq');
        var beliefs=$$('.belief');
        gsap.set([meta,brand,seq],{opacity:0});
        window.__timelines=window.__timelines||{};
        var D=parseFloat(root.getAttribute('data-duration'))||6.0;
        var tl=gsap.timeline({paused:true});
        tl.to(bg,{scale:1.09,duration:D,ease:"none",transformOrigin:"50% 42%"},0)
          .to(center,{scale:1.03,y:-16,duration:D,ease:"sine.inOut",transformOrigin:"0% 40%"},0);
        tl.to(meta,{opacity:1,duration:.5},0.1)
          .to([brand,seq],{opacity:1,duration:.4},0.2)
          .to(label,{opacity:1,y:0,duration:.5,ease:"power3.out"},0.35).from(label,{y:20},0.35);
        var b0=Math.min(1.4,D*0.13), bstep=Math.max(1.6,(D-b0-0.9)/beliefs.length);
        beliefs.forEach(function(b,i){
          var t=b0+i*bstep, m=b.querySelector('.bmark');
          tl.to(b,{opacity:1,x:0,duration:.55,ease:"power3.out"},t).from(b,{x:-30},t);
          tl.from(m,{scale:.3,rotation:-90,duration:.5,ease:"back.out(2)",transformOrigin:"50% 50%"},t);
          tl.fromTo(m,{scale:1},{scale:1.25,duration:.34,ease:"sine.out",transformOrigin:"50% 50%"},t+.55).to(m,{scale:1,duration:.5,ease:"sine.inOut"},t+.89);
        });
        tl.set({},{},6.0);
        window.__timelines[ID]=tl;
      })();
    </script>
  </div>
</template>
