<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WayCast 控制台</title>
<style>
  :root{--accent:#ff8a00;--bg:#0b0e13;--card:#141922;--line:#222b36;--mut:#8a93a0}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:#eef2f6;font:14px/1.5 -apple-system,Segoe UI,Roboto,'Noto Sans SC',sans-serif}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header b{font-size:18px;letter-spacing:.04em} header b span{color:var(--accent)}
  #caps{margin-left:auto;font-size:12px;color:var(--mut);display:flex;gap:14px;flex-wrap:wrap}
  .pill{padding:2px 8px;border:1px solid var(--line);border-radius:99px} .ok{color:#5fd08a;border-color:#234} .no{color:var(--mut)}
  main{max-width:1100px;margin:0 auto;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px}
  .card h2{margin:0 0 12px;font-size:15px;letter-spacing:.03em} .span2{grid-column:1/3}
  label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  input,select,textarea,button{font:inherit;color:inherit;background:#0e131a;border:1px solid var(--line);border-radius:8px;padding:9px 11px;width:100%}
  textarea{min-height:150px;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre}
  .row{display:flex;gap:10px} .row>*{flex:1}
  button{background:var(--accent);color:#161616;border:none;font-weight:600;cursor:pointer;width:auto;padding:9px 18px}
  button.ghost{background:transparent;color:#eef2f6;border:1px solid var(--line);font-weight:500}
  button:disabled{opacity:.5;cursor:not-allowed}
  .log{background:#080b10;border:1px solid var(--line);border-radius:8px;padding:10px;height:170px;overflow:auto;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#bcc7d3;white-space:pre-wrap}
  .brand-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer}
  .brand-item:hover{border-color:var(--accent)} .brand-item small{color:var(--mut)}
  a{color:var(--accent)} .muted{color:var(--mut);font-size:12px}
</style></head>
<body>
<header><b>Way<span>Cast</span> 控制台</b><div id="caps">加载中…</div></header>
<main>
  <section class="card">
    <h2>① 生成品牌包(URL → 文案/选图)</h2>
    <label>公司官网 URL</label><input id="g-url" placeholder="https://example.com">
    <div class="row">
      <div><label>slug(可选)</label><input id="g-slug" placeholder="自动取名"></div>
      <div><label>借用背景图(无图库 key 时)</label><select id="g-reuse"><option value="">不借用</option></select></div>
    </div>
    <label><input type="checkbox" id="g-force" style="width:auto"> 覆盖同名品牌(--force)</label>
    <div style="margin-top:12px" class="row">
      <button id="g-run">生成</button><button class="ghost" id="g-refresh">刷新列表</button>
    </div>
    <div class="log" id="g-log" style="margin-top:12px">就绪。生成后到右侧"品牌"里编辑/渲染。</div>
  </section>

  <section class="card">
    <h2>② 品牌</h2>
    <div id="brands" class="muted">加载中…</div>
  </section>

  <section class="card span2" id="editor" style="display:none">
    <h2>③ 编辑 <span id="e-name"></span> <span class="muted" id="e-slug"></span></h2>
    <div class="row">
      <div><label>storyboard.json(镜头+文案)</label><textarea id="e-sb"></textarea></div>
      <div><label>vo.json(中英旁白)</label><textarea id="e-vo"></textarea></div>
      <div><label>brand.json(名称/主色/城市)</label><textarea id="e-brand"></textarea></div>
    </div>
    <div class="row" style="margin-top:12px;align-items:flex-end">
      <div style="flex:0 0 auto"><button id="e-save" class="ghost">保存编辑</button></div>
      <div><label>语言</label><select id="r-lang"><option value="en">英文</option><option value="zh">中文(需 vo_zh)</option></select></div>
      <div><label>画质</label><select id="r-quality"><option value="draft">draft(快)</option><option value="standard">standard(成片)</option></select></div>
      <div><label>声线后端</label><select id="r-tts"></select></div>
      <div><label>音色(可选)</label><input id="r-voice" placeholder="默认"></div>
      <div style="flex:0 0 auto"><button id="r-run">渲染出片</button></div>
    </div>
    <div class="log" id="r-log" style="margin-top:12px"></div>
    <div id="e-review" class="muted" style="margin-top:10px;white-space:pre-wrap;max-height:160px;overflow:auto"></div>
  </section>

  <section class="card span2">
    <h2>④ 成片</h2>
    <div id="outputs" class="muted">—</div>
  </section>
</main>
<script>
const $=s=>document.querySelector(s), api=(u,o)=>fetch(u,o).then(r=>r.json());
let CAPS=null, CUR=null;

function streamSSE(url, body, logEl, done){
  logEl.textContent=''; const append=t=>{logEl.textContent+=t+'\n';logEl.scrollTop=logEl.scrollHeight;};
  fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)}).then(async r=>{
    if(!r.ok){append('✗ '+(await r.json()).error);return;}
    const rd=r.body.getReader(), dec=new TextDecoder(); let buf='';
    for(;;){const{value,done:d}=await rd.read();if(d)break;buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n');buf=parts.pop();
      for(const blk of parts){const ev=(blk.match(/event: (.*)/)||[])[1], dm=(blk.match(/data: (.*)/)||[])[1];
        if(!dm)continue; let data;try{data=JSON.parse(dm)}catch{data=dm}
        if(ev==='log')append(data); else if(ev==='start')append('$ '+data.cmd);
        else if(ev==='done'){append('✅ 完成');done&&done(true);} else if(ev==='error'){append('✗ 失败 '+(data.code??data));done&&done(false);}
      }}
  }).catch(e=>append('✗ '+e.message));
}

async function loadCaps(){
  CAPS=await api('/api/capabilities');
  const t=CAPS.tts.filter(x=>x.ok).map(x=>x.provider);
  $('#caps').innerHTML=[
    `<span class="pill ${CAPS.coreOk?'ok':'no'}">core ${CAPS.coreOk?'✓':'✗'}</span>`,
    `<span class="pill ${t.length?'ok':'no'}">TTS: ${t.join(', ')||'无'}</span>`,
    `<span class="pill ${CAPS.llm?'ok':'no'}">文案: ${CAPS.llm||'启发式'}</span>`,
    `<span class="pill ${CAPS.images?'ok':'no'}">选图: ${CAPS.images||'手动'}</span>`,
  ].join('');
  $('#r-tts').innerHTML=CAPS.tts.map(x=>`<option value="${x.provider}" ${x.ok?'':'disabled'}>${x.provider}${x.ok?'':'(缺依赖)'}</option>`).join('');
}
async function loadBrands(){
  const bs=await api('/api/brands');
  $('#g-reuse').innerHTML='<option value="">不借用</option>'+bs.filter(b=>b.hasBg).map(b=>`<option>${b.slug}</option>`).join('');
  $('#brands').innerHTML=bs.length?bs.map(b=>`<div class="brand-item" data-slug="${b.slug}"><span>${b.name} <small>· ${b.slug} · ${b.shots}镜 ${b.hasBg?'· 有图':'· 缺图'}</small></span><span class="muted">编辑 ›</span></div>`).join(''):'<span class="muted">还没有品牌,先在左侧生成。</span>';
  document.querySelectorAll('.brand-item').forEach(el=>el.onclick=()=>openBrand(el.dataset.slug));
}
async function openBrand(slug){
  const d=await api('/api/brand/'+slug); if(d.error)return alert(d.error);
  CUR=slug; $('#editor').style.display=''; $('#e-name').textContent=d.brand?.name||slug; $('#e-slug').textContent='· '+slug;
  $('#e-sb').value=JSON.stringify(d.storyboard,null,2); $('#e-vo').value=JSON.stringify(d.vo,null,2); $('#e-brand').value=JSON.stringify(d.brand,null,2);
  $('#e-review').textContent=d.review||''; $('#editor').scrollIntoView({behavior:'smooth'});
}
async function loadOutputs(){
  const o=await api('/api/outputs');
  $('#outputs').innerHTML=o.length?o.map(f=>`<div class="brand-item"><span>${f.file} <small>· ${(f.size/1048576).toFixed(1)} MB</small></span><a href="/api/download/${f.file}">下载</a></div>`).join(''):'<span class="muted">还没有成片。</span>';
}

$('#g-run').onclick=()=>{const url=$('#g-url').value.trim();if(!url)return; $('#g-run').disabled=true;
  streamSSE('/api/generate',{url,slug:$('#g-slug').value.trim(),reuseBg:$('#g-reuse').value,force:$('#g-force').checked,provider:undefined},$('#g-log'),ok=>{$('#g-run').disabled=false; if(ok)loadBrands();});};
$('#g-refresh').onclick=()=>{loadBrands();loadOutputs();};
$('#e-save').onclick=async()=>{try{
  const body={brand:JSON.parse($('#e-brand').value),storyboard:JSON.parse($('#e-sb').value),vo:JSON.parse($('#e-vo').value)};
  const r=await api('/api/brand/'+CUR,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  alert(r.ok?'已保存':('保存失败: '+r.error));}catch(e){alert('JSON 格式错误: '+e.message);}};
$('#r-run').onclick=()=>{if(!CUR)return; $('#r-run').disabled=true;
  streamSSE('/api/render',{slug:CUR,lang:$('#r-lang').value,quality:$('#r-quality').value,ttsProvider:$('#r-tts').value,voice:$('#r-voice').value.trim()},$('#r-log'),ok=>{$('#r-run').disabled=false; if(ok)loadOutputs();});};

loadCaps();loadBrands();loadOutputs();
</script>
</body></html>
